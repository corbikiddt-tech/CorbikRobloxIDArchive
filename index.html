<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorbikRobloxIDArchive</title>
    <style>
        /* Base styles matching your UI color scheme */
        body {
            background-color: #0d1b2a;
            color: #ffffff;
            font-family: sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #1b263b;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .viewer-box {
            background-color: #0a0f1d;
            border: 1px solid #415a77;
            border-radius: 4px;
            padding: 15px;
            min-height: 200px;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            color: #e0e1dd;
        }
        .error-message {
            color: #e63946;
            font-weight: bold;
        }
        button {
            background-color: #e0e1dd;
            color: #0d1b2a;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Roblox Music ID Archive Viewer</h2>
    
    <!-- Action elements mirroring your UI -->
    <div style="margin-bottom: 10px;">
        <button id="refresh-btn">Refresh Archive</button>
    </div>
    
    <div id="last-updated" style="font-size: 0.9em; color: #a5a5a5;">
        Last Updated: Unknown
    </div>

    <!-- The viewer display container -->
    <div id="archive-viewer" class="viewer-box">
        <span class="error-message">Loading archive...</span>
    </div>
</div>

<script>
    async function loadMusicArchive() {
        const viewer = document.getElementById("archive-viewer");
        const lastUpdatedText = document.getElementById("last-updated");

        // Relative path string ensuring compatibility with GitHub Pages routing
        const filePath = "RobloxMusicIds.txt"; 

        try {
            const response = await fetch(filePath);

            if (!response.ok) {
                // Catches 404 Not Found errors caused by casing mistakes on GitHub
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.text();
            
            // Render the text content inside the viewer box
            viewer.innerText = data;
            
            // Update time stamp upon a successful network fetch
            const now = new Date();
            lastUpdatedText.innerText = `Last Updated: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

        } catch (error) {
            // Render the targeted error UI state if the file cannot be accessed
            viewer.innerHTML = `<span class="error-message">Error loading RobloxMusicIds.txt (${error.message})</span>`;
        }
    }

    // Bind event listeners to UI components
    document.getElementById("refresh-btn").addEventListener("click", loadMusicArchive);
    
    // Initial fetch cycle on initial document load
    window.addEventListener("DOMContentLoaded", loadMusicArchive);
</script>

</body>
</html>
