<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Music ID Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        #container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: auto;
        }
        #output {
            white-space: pre-wrap;
            background: #fafafa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-top: 10px;
        }
        #refresh {
            margin-top: 15px;
            padding: 10px 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="container">
    <h2>RobloxMusicIds.txt Viewer</h2>
    <p>This page loads the exact contents of <strong>RobloxMusicIds.txt</strong> from your GitHub Pages site.</p>

    <button id="refresh">Refresh File</button>

    <div id="output">Loading...</div>
</div>

<script>
    async function loadTXT() {
        const output = document.getElementById("output");

        try {
            const response = await fetch("RobloxMusicIds.txt", {
                cache: "no-cache"
            });

            if (!response.ok) {
                output.textContent = "Error loading RobloxMusicIds.txt (HTTP " + response.status + ")";
                return;
            }

            const text = await response.text();
            output.textContent = text;
        } catch (err) {
            output.textContent = "Failed to load file: " + err;
        }
    }

    document.getElementById("refresh").addEventListener("click", loadTXT);

    // Load on startup
    loadTXT();
</script>

</body>
</html>
